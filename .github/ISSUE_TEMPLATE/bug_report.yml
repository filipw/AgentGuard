name: Bug Report
description: Report a bug in AgentGuard
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      render: csharp
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AgentGuard Version
      placeholder: "0.1.0-preview.1"
  - type: input
    id: dotnet
    attributes:
      label: .NET Version
      placeholder: "8.0.x or 9.0.x"
